services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: messaging
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d messaging"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/rorylinnane-evolve/messagine-system/api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: Host=db;Database=messaging;Username=${DB_USER};Password=${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
