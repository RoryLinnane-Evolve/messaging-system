<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureMsg</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f17;
    --surface:  #1a1a2e;
    --border:   #2a2a45;
    --accent:   #7c6af7;
    --accent-h: #6356e0;
    --text:     #e2e2f0;
    --muted:    #6c6c9a;
    --me-bg:    #2a1f6e;
    --them-bg:  #1e1e35;
    --danger:   #e05252;
    --radius:   10px;
    --font:     system-ui, -apple-system, sans-serif;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text);
         height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Auth ── */
  #auth-screen {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2.5rem; width: 360px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .auth-box h1 { font-size: 1.4rem; text-align: center; color: var(--accent); }
  .auth-box p  { text-align: center; color: var(--muted); font-size: .85rem; }
  .auth-tabs { display: flex; gap: .5rem; }
  .tab-btn {
    flex: 1; padding: .6rem; background: transparent; border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--muted); cursor: pointer; font-size: .9rem;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  input, button { font-family: inherit; font-size: .95rem; }
  input {
    width: 100%; padding: .7rem .9rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: .75rem; background: var(--accent);
    border: none; border-radius: var(--radius); color: #fff;
    cursor: pointer; font-weight: 600; transition: background .15s;
  }
  .btn:hover { background: var(--accent-h); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-sm {
    padding: .45rem .9rem; font-size: .85rem; font-weight: 500;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; cursor: pointer; white-space: nowrap;
  }
  .btn-sm:hover { background: var(--accent-h); }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #c04040; }
  .error { color: var(--danger); font-size: .85rem; text-align: center; min-height: 1.2em; }

  /* ── App layout ── */
  #app-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 1.25rem; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  header .logo { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
  header .user-info { display: flex; align-items: center; gap: .75rem;
                       color: var(--muted); font-size: .9rem; }

  .app-body { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: .9rem 1rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header span { font-size: .85rem; color: var(--muted); font-weight: 600;
                          text-transform: uppercase; letter-spacing: .05em; }
  #conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    padding: .85rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background .1s; display: flex; flex-direction: column; gap: .25rem;
  }
  .conv-item:hover { background: var(--border); }
  .conv-item.active { background: var(--me-bg); border-left: 3px solid var(--accent); }
  .conv-item .conv-row { display: flex; align-items: center; justify-content: space-between; }
  .conv-item .conv-name { font-size: .9rem; font-weight: 500; }
  .conv-item .conv-preview { font-size: .78rem; color: var(--muted);
                              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { background: var(--accent); color: #fff; border-radius: 99px;
           font-size: .7rem; padding: .1rem .45rem; }

  /* ── Main area ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header {
    padding: .85rem 1.25rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .chat-header .chat-title { font-weight: 600; }
  .chat-header .chat-actions { display: flex; gap: .5rem; }

  #messages {
    flex: 1; overflow-y: auto; padding: 1rem;
    display: flex; flex-direction: column; gap: .6rem;
  }
  .msg-wrap { display: flex; flex-direction: column; max-width: 68%; }
  .msg-wrap.me   { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.them { align-self: flex-start; align-items: flex-start; }
  .msg-sender { font-size: .72rem; color: var(--muted); margin-bottom: .25rem; padding: 0 .5rem; }
  .msg-bubble {
    padding: .6rem .9rem; border-radius: var(--radius); line-height: 1.5;
    font-size: .9rem; word-break: break-word;
  }
  .msg-wrap.me   .msg-bubble { background: var(--me-bg);   border-bottom-right-radius: 2px; }
  .msg-wrap.them .msg-bubble { background: var(--them-bg); border-bottom-left-radius: 2px; }
  .msg-bubble.encrypted { color: var(--muted); font-style: italic; font-size: .82rem; }
  .msg-time { font-size: .7rem; color: var(--muted); margin-top: .2rem; padding: 0 .5rem; }

  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center;
                 color: var(--muted); font-size: .9rem; }

  .input-bar {
    padding: .75rem 1rem; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: .75rem; align-items: flex-end; flex-shrink: 0;
  }
  #msg-input {
    flex: 1; resize: none; min-height: 2.5rem; max-height: 7rem;
    padding: .6rem .9rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: inherit; font-size: .9rem;
    outline: none; transition: border-color .15s; line-height: 1.4;
  }
  #msg-input:focus { border-color: var(--accent); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; width: 340px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .modal h2 { font-size: 1rem; }
  .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; }

  .ws-dot { width: 8px; height: 8px; border-radius: 50%;
             display: inline-block; background: var(--muted); }
  .ws-dot.connected    { background: #4caf50; }
  .ws-dot.disconnected { background: var(--danger); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- libsodium-wrappers — same primitives as the C++ client (crypto_box = X25519 + XSalsa20-Poly1305) -->
<script src="https://cdn.jsdelivr.net/npm/libsodium-wrappers/dist/modules/libsodium-wrappers.js"></script>

<!-- ═══════════════════════════════════ AUTH ══════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>SecureMsg</h1>
    <p>End-to-end encrypted messaging</p>
    <div class="auth-tabs">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Login</button>
      <button class="tab-btn"        id="tab-reg"   onclick="showTab('reg')">Register</button>
    </div>
    <input id="auth-username" type="text"     placeholder="Username" autocomplete="off">
    <input id="auth-password" type="password" placeholder="Password">
    <div id="auth-error" class="error"></div>
    <button class="btn" id="auth-btn" onclick="authSubmit()">Login</button>
  </div>
</div>

<!-- ═══════════════════════════════════ APP ═══════════════════════════════════════ -->
<div id="app-screen" hidden>
  <header>
    <span class="logo">SecureMsg</span>
    <div class="user-info">
      <span class="ws-dot" id="ws-dot"></span>
      <span id="hdr-username"></span>
      <button class="btn-sm btn-danger" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Conversations</span>
        <button class="btn-sm" onclick="openNewConvModal()">+</button>
      </div>
      <div id="conv-list"></div>
    </aside>

    <div class="main">
      <div class="chat-header" id="chat-header" style="display:none">
        <span class="chat-title" id="chat-title"></span>
        <div class="chat-actions">
          <button class="btn-sm" onclick="showRevokePrompt()">Revoke access</button>
        </div>
      </div>
      <div id="messages"><div class="empty-state">Select a conversation</div></div>
      <div class="input-bar" id="input-bar" style="display:none">
        <textarea id="msg-input" rows="1" placeholder="Type a message…"
                  onkeydown="inputKeydown(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-sm" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- New conversation modal -->
<div class="modal-overlay" id="new-conv-modal" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal">
    <h2>New Conversation</h2>
    <input id="new-conv-username" type="text" placeholder="Username to chat with" autocomplete="off">
    <div id="new-conv-error" class="error"></div>
    <div class="modal-actions">
      <button class="btn-sm" style="background:transparent;color:var(--muted)"
              onclick="document.getElementById('new-conv-modal').style.display='none'">Cancel</button>
      <button class="btn-sm" onclick="createConversation()">Create</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════ CONFIG ══════════════════════════════════
const API = 'http://localhost:8080';
const WS  = 'ws://localhost:8080/ws';

// ═══════════════════ STATE ═══════════════════════════════════
let sodium;         // libsodium instance (set after ready)
let token        = null;
let myUsername   = null;
let mySecretKey  = null;   // Uint8Array(32)
let myPublicKey  = null;   // Uint8Array(32)

let ws             = null;
let conversations  = [];
let currentConvId  = null;
let messageCache   = {};   // convId → [decorated msg]
let recipientKeyCache = {}; // username → Uint8Array(32) public key
let unread         = {};   // convId → count
let authMode       = 'login';

// ═══════════════════ BASE64 (URL-safe, no padding — matches C++ client) ══════
function b64Encode(bytes) {
  return btoa(String.fromCharCode(...bytes))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function b64Decode(str) {
  str = (str || '').replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  return Uint8Array.from(atob(str), c => c.charCodeAt(0));
}

// ═══════════════════ CRYPTO ══════════════════════════════════
// Uses libsodium crypto_box_easy (X25519 + XSalsa20-Poly1305).
// Compatible with the C++ client which uses the same libsodium primitives.

function cryptoEncryptFor(plaintext, recipientPk) {
  // Ephemeral keypair for forward secrecy (sender is anonymous at crypto level)
  const epk   = sodium.crypto_box_keypair();
  const nonce = sodium.randombytes_buf(sodium.crypto_box_NONCEBYTES);
  const ct    = sodium.crypto_box_easy(
    new TextEncoder().encode(plaintext),
    nonce,
    recipientPk,
    epk.privateKey
  );
  return {
    ciphertext:        b64Encode(ct),
    nonce:             b64Encode(nonce),
    ephemeralPublicKey: b64Encode(epk.publicKey)
  };
}

function cryptoDecrypt(msg) {
  const ct    = b64Decode(msg.ciphertext);
  const nonce = b64Decode(msg.nonce);
  const epk   = b64Decode(msg.ephemeralPublicKey);
  const plain = sodium.crypto_box_open_easy(ct, nonce, epk, mySecretKey);
  return new TextDecoder().decode(plain);
}

// ── Private key storage (raw 32 bytes wrapped with PBKDF2 + AES-GCM) ────────
async function wrapSecretKey(sk, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const km   = await crypto.subtle.importKey('raw',
    new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const wrapKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 200_000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
  const wrapped = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, wrapKey, sk);
  return { salt: b64Encode(salt), iv: b64Encode(iv), data: b64Encode(new Uint8Array(wrapped)) };
}

async function unwrapSecretKey(stored, password) {
  const salt = b64Decode(stored.salt);
  const iv   = b64Decode(stored.iv);
  const data = b64Decode(stored.data);
  const km   = await crypto.subtle.importKey('raw',
    new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const wrapKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 200_000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, wrapKey, data);
  return new Uint8Array(plain);
}

// ═══════════════════ API ═════════════════════════════════════

async function apiFetch(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': 'Bearer ' + token } : {})
    }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function getRecipientKey(username) {
  if (recipientKeyCache[username]) return recipientKeyCache[username];

  const user = await apiFetch('GET', '/api/user/' + username);

  // TOFU: pin on first fetch, warn on change
  const pinned = localStorage.getItem('tofu:' + username);
  if (pinned && pinned !== user.publicKey) {
    throw new Error(`TOFU WARNING: ${username}'s public key has changed — possible MITM! Aborting.`);
  }
  if (!pinned) localStorage.setItem('tofu:' + username, user.publicKey);

  const keyBytes = b64Decode(user.publicKey);
  recipientKeyCache[username] = keyBytes;
  return keyBytes;
}

// ═══════════════════ WEBSOCKET ═══════════════════════════════

function connectWs() {
  if (ws) { ws.onclose = null; ws.close(); }
  ws = new WebSocket(`${WS}?token=${token}`);

  ws.onopen  = () => setWsDot(true);
  ws.onerror = () => ws.close();
  ws.onclose = () => {
    setWsDot(false);
    if (token) setTimeout(connectWs, 3000); // reconnect only if still logged in
  };
  ws.onmessage = async (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'new_message') await handleIncoming(msg.data);
    } catch {}
  };
}

function wsSend(payload) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(payload));
}

function setWsDot(on) {
  document.getElementById('ws-dot').className = 'ws-dot ' + (on ? 'connected' : 'disconnected');
}

async function handleIncoming(msg) {
  // Skip our own echo — we rendered it optimistically on send
  if (msg.senderUsername === myUsername) return;

  let plain = null;
  try { plain = cryptoDecrypt(msg); } catch {}

  const decorated = { ...msg, _plain: plain };

  if (!messageCache[msg.conversationId]) messageCache[msg.conversationId] = [];
  messageCache[msg.conversationId].push(decorated);

  if (msg.conversationId === currentConvId) {
    appendBubble(decorated);
    scrollBottom();
  } else {
    unread[msg.conversationId] = (unread[msg.conversationId] || 0) + 1;
    renderConvList();
  }
}

// ═══════════════════ AUTH ════════════════════════════════════

function showTab(tab) {
  authMode = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-reg').classList.toggle('active', tab === 'reg');
  document.getElementById('auth-btn').textContent = tab === 'login' ? 'Login' : 'Register';
  document.getElementById('auth-error').textContent = '';
}

async function authSubmit() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  const btn      = document.getElementById('auth-btn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Fill in all fields.'; return; }
  btn.disabled = true;
  try {
    if (authMode === 'reg') await register(username, password);
    else                    await login(username, password);
  } catch (e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

async function register(username, password) {
  const kp = sodium.crypto_box_keypair();
  const pubB64 = b64Encode(kp.publicKey);

  await apiFetch('POST', '/api/auth/sign-up', { username, password, publicKey: pubB64 });

  // Persist secret key encrypted with password
  const wrapped = await wrapSecretKey(kp.privateKey, password);
  localStorage.setItem('keys:' + username, JSON.stringify({ wrapped, publicKey: pubB64 }));

  await login(username, password);
}

async function login(username, password) {
  const res = await apiFetch('POST', '/api/auth/login', { username, password });
  token      = res.token;
  myUsername = username;

  const stored = JSON.parse(localStorage.getItem('keys:' + username) || 'null');
  if (!stored) throw new Error('No local keys for this account. Register from this browser first.');

  mySecretKey = await unwrapSecretKey(stored.wrapped, password);
  myPublicKey = b64Decode(stored.publicKey);

  showApp();
}

function logout() {
  token = null; myUsername = null; mySecretKey = null; myPublicKey = null;
  conversations = []; currentConvId = null;
  messageCache = {}; recipientKeyCache = {}; unread = {};
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  document.getElementById('app-screen').hidden = true;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-username').value = '';
  document.getElementById('auth-password').value = '';
  setWsDot(false);
}

// ═══════════════════ APP ═════════════════════════════════════

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').hidden = false;
  document.getElementById('hdr-username').textContent = myUsername;
  connectWs();
  await loadConversations();
}

// ═══════════════════ CONVERSATIONS ═══════════════════════════

async function loadConversations() {
  conversations = await apiFetch('GET', '/api/conversation');
  renderConvList();
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  conversations.forEach(conv => {
    const others = conv.participants.filter(p => p !== myUsername);
    const name   = others.join(', ') || '(just you)';
    const badge  = unread[conv.id];
    const el = document.createElement('div');
    el.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
    el.innerHTML = `
      <div class="conv-row">
        <span class="conv-name">${esc(name)}</span>
        ${badge ? `<span class="badge">${badge}</span>` : ''}
      </div>
      <div class="conv-preview">${esc(conv.createdAt?.slice(0,10) || '')}</div>`;
    el.onclick = () => openConversation(conv);
    list.appendChild(el);
  });
}

async function openConversation(conv) {
  currentConvId = conv.id;
  unread[conv.id] = 0;
  const others = conv.participants.filter(p => p !== myUsername);
  document.getElementById('chat-title').textContent = others.join(', ') || '(just you)';
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('input-bar').style.display   = 'flex';
  renderConvList();
  await loadMessages(conv.id);
}

function openNewConvModal() {
  document.getElementById('new-conv-username').value = '';
  document.getElementById('new-conv-error').textContent = '';
  document.getElementById('new-conv-modal').style.display = 'flex';
}

function closeModalOverlay(e) {
  if (e.target.id === 'new-conv-modal')
    document.getElementById('new-conv-modal').style.display = 'none';
}

async function createConversation() {
  const username = document.getElementById('new-conv-username').value.trim();
  const errEl    = document.getElementById('new-conv-error');
  errEl.textContent = '';
  if (!username) return;
  try {
    const conv = await apiFetch('POST', '/api/conversation', { participantUsernames: [username] });
    document.getElementById('new-conv-modal').style.display = 'none';
    await loadConversations();
    openConversation(conv);
  } catch (e) {
    errEl.textContent = 'Failed: ' + e.message;
  }
}

// ═══════════════════ MESSAGES ════════════════════════════════

async function loadMessages(convId) {
  const msgs = await apiFetch('GET', '/api/message/conversation/' + convId);
  const container = document.getElementById('messages');
  container.innerHTML = '';

  const decorated = msgs.map(m => {
    let plain = null;
    if (m.senderUsername === myUsername) {
      // Messages we sent are encrypted for the recipient — we can't decrypt them.
      // Show placeholder; they were visible when sent via optimistic render.
      plain = '(sent)';
    } else {
      try { plain = cryptoDecrypt(m); } catch {}
    }
    return { ...m, _plain: plain };
  });

  messageCache[convId] = decorated;

  if (decorated.length === 0) {
    container.innerHTML = '<div class="empty-state">No messages yet</div>';
    return;
  }
  decorated.forEach(m => appendBubble(m));
  scrollBottom();
}

function appendBubble(msg) {
  const container = document.getElementById('messages');
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();

  const isMe  = msg.senderUsername === myUsername;
  const plain = msg._plain;
  const time  = msg.timestamp
    ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '';

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isMe ? 'me' : 'them');
  wrap.innerHTML = `
    <div class="msg-sender">${esc(msg.senderUsername)}</div>
    <div class="msg-bubble${plain ? '' : ' encrypted'}">${
      plain ? esc(plain) : '🔒 could not decrypt'
    }</div>
    <div class="msg-time">${time}</div>`;
  container.appendChild(wrap);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !currentConvId) return;

  const conv   = conversations.find(c => c.id === currentConvId);
  const others = conv?.participants.filter(p => p !== myUsername) || [];
  if (!others.length) return;

  let recipientKey;
  try { recipientKey = await getRecipientKey(others[0]); }
  catch (e) { alert(e.message); return; }

  const encrypted = cryptoEncryptFor(text, recipientKey);
  const payload   = { conversationId: currentConvId, ...encrypted };

  // Optimistic render
  appendBubble({
    senderUsername: myUsername,
    timestamp: new Date().toISOString(),
    _plain: text
  });
  scrollBottom();

  input.value = '';
  input.style.height = '';

  // Send via WebSocket (falls back gracefully if disconnected)
  if (ws && ws.readyState === WebSocket.OPEN) {
    wsSend({ type: 'send_message', data: payload });
  } else {
    // REST fallback when WebSocket is not connected
    try { await apiFetch('POST', '/api/message', payload); }
    catch (e) { console.error('Send failed:', e); }
  }
}

async function showRevokePrompt() {
  const username = prompt('Revoke access for username:');
  if (!username) return;
  try {
    const user = await apiFetch('GET', '/api/user/' + username);
    await apiFetch('POST', `/api/message/${currentConvId}/revoke/${user.id}`, {});
    alert(`Access revoked for ${username}.`);
    await loadConversations();
  } catch (e) { alert('Failed: ' + e.message); }
}

// ═══════════════════ UI HELPERS ══════════════════════════════

function scrollBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 112) + 'px';
}

function inputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

  await _sodium.ready;
  sodium = _sodium;
