services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: messaging
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: Host=db;Database=messaging;Username=${DB_USER};Password=${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
